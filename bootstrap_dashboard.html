<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

        <style>
        body {
            background-color: #f8f9fa;
        }
        #sidebar {
            width: 250px;
            height: 100vh;
            top: 0;
            left: 0;
            z-index: 100;
            background-color: #212529;
        }
        .main-content {
            margin-left: 250px;
            padding: 20px;
        }
        @media (max-width: 991.98px) {
            #sidebar {
                position: relative;
                width: 100%;
                height: auto;
            }
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <nav id="sidebar" class="position-fixed d-md-block collapse">
        <div class="p-3 text-white">
            <h4 class="fw-bold">Admin Panel</h4>
            <hr>
            <ul class="list-group list-group-flush list-group-dark">
                <a href="#" class="list-group-item list-group-item-action bg-dark text-white border-0 py-3">
                    Dashboard
                </a>
                <a href="#" class="list-group-item list-group-item-action bg-dark text-white border-0 py-3">
                    Orders
                </a>
                <a href="#" class="list-group-item list-group-item-action bg-dark text-white border-0 py-3">
                    Products
                </a>
                <a href="#" class="list-group-item list-group-item-action bg-dark text-white border-0 py-3">
                    Customers
                </a>
                <a href="#" class="list-group-item list-group-item-action bg-dark text-white border-0 py-3">
                    Settings
                </a>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="#">Home</a></li>
                    <li class="breadcrumb-item active">Dashboard</li>
                </ol>
            </nav>
            <div class="dropdown">
                <button class="btn btn-light dropdown-toggle" type="button" data-bs-toggle="dropdown">
                    Admin User
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="#">Profile</a></li>
                    <li><a class="dropdown-item" href="#">Settings</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="#">Logout</a></li>
                </ul>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-12 col-md-6 col-lg-3">
                <div class="card bg-primary text-white border-0 shadow-sm">
                    <div class="card-body">
                        <h6 class="card-title">Total Sales</h6>
                        <h2 class="mb-0">$12,450</h2>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-6 col-lg-3">
                <div class="card bg-success text-white border-0 shadow-sm">
                    <div class="card-body">
                        <h6 class="card-title">Completed Orders</h6>
                        <h2 class="mb-0">156</h2>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-6 col-lg-3">
                <div class="card bg-warning text-dark border-0 shadow-sm">
                    <div class="card-body">
                        <h6 class="card-title">Pending Tasks</h6>
                        <h2 class="mb-0">23</h2>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-6 col-lg-3">
                <div class="card bg-danger text-white border-0 shadow-sm">
                    <div class="card-body">
                        <h6 class="card-title">Revenue (Daily)</h6>
                        <h2 class="mb-0">$1,200</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="alert alert-success alert-dismissible fade show" role="alert">
            <strong>Welcome back!</strong> Your dashboard data has been updated successfully.
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

       
    </main>



     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
</body>
</html>
